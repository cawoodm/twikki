server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Emit a relative Location (/twikki/) instead of an absolute URL, so the
    # redirect keeps the caller's host and port (e.g. localhost:8081) rather
    # than rewriting to the default :80.
    absolute_redirect off;

    # twikki always runs under /twikki/ (matches the published GitHub Pages base
    # and the absolute paths baked into the manifest + service-worker fallback),
    # so the build is copied into html/twikki/. Send the bare root there.
    location = / {
        return 302 /twikki/;
    }
}
